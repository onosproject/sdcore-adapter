name: Master workflow
on:
  push:
    branches:
      - master
  pull_request:

env:
  DOCKER_LABEL_VCS_URL: git remote get-url $(git remote)
  VERSION: cat ./VERSION
  DOCKER_LABEL_VCS_REF: git rev-parse HEAD
  DOCKER_LABEL_BUILD_DATE: date -u "+%Y-%m-%dT%H:%M:%SZ"
  DOCKER_LABEL_COMMIT_DATE: git show -s --format=%cd --date=iso-strict HEAD
  DOCKER_BUILD_ARGS: --build-arg org_label_schema_version="$VERSION" --build-arg org_label_schema_vcs_url="$DOCKER_LABEL_VCS_URL" --build-arg org_label_schema_vcs_ref="$DOCKER_LABEL_VCS_REF" --build-arg org_label_schema_build_date="$DOCKER_LABEL_BUILD_DATE" --build-arg org_opencord_vcs_commit_date="$DOCKER_LABEL_COMMIT_DATE"
  DOCKER_REPOSITORY: onosproject/
  ONOS_SDCORE_ADAPTER_VERSION: latest

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
      - name: Build
        run: |
          go build -o build/_output/sdcore-adapter ./cmd/sdcore-adapter
          go build -o build/_output/sdcore-migrate ./cmd/sdcore-migrate
          go build -o build/_output/sdcore-kafka ./cmd/sdcore-kafka

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
      - uses: golangci/golangci-lint-action@v4.0.0
        with:
          version: latest
          args: -v --config ./.golangci.yml --timeout=15m

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
      - name: Unit tests
        run: |
          go test -cover -race github.com/onosproject/sdcore-adapter/pkg/...
          go test -cover -race github.com/onosproject/sdcore-adapter/cmd/...

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
      - name: Build Docker image
        run: docker build . -f Dockerfile $(DOCKER_BUILD_ARGS) -t ${DOCKER_REPOSITORY}sdcore-adapter:${ONOS_SDCORE_ADAPTER_VERSION}

  license-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: reuse lint
        uses: fsfe/reuse-action@v2

  fossa-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: FOSSA scan
        uses: fossa-contrib/fossa-action@v3
        with:
          fossa-api-key: 6d304c09a3ec097ba4517724e4a4d17d
